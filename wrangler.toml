"$schema" = "./node_modules/wrangler/config-schema.json"
name = "calistique"
pages_build_output_dir = "dist"
compatibility_date = "2026-03-22"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"
APP_NAME = "calistique"
SITE_URL = "https://calistique.xyz"
WWW_SITE_URL = "https://www.calistique.xyz"
SITE_ORIGIN = "https://calistique.xyz"
WWW_SITE_ORIGIN = "https://www.calistique.xyz"
API_MODE = "repo-local"
VITE_ENABLE_ADS = "true"
VITE_ADSENSE_CLIENT_ID = "ca-pub-5800977493749262"
VITE_CLOUDFLARE_WEB_ANALYTICS_TOKEN = "replace-with-cloudflare-web-analytics-token"

[[r2_buckets]]
binding = "ASSETS_BUCKET"
  bucket_name = "calistique"
  preview_bucket_name = "calistique-preview"

# CF Pages secrets required (set via CF dashboard or: wrangler pages secret put <NAME>):
# STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET
# PAYPAL_CLIENT_ID, PAYPAL_CLIENT_SECRET
# RESEND_API_KEY
# CJ_API_KEY, CJ_WEBSITE_ID (optional — dropship affiliate feed)
